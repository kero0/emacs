name: "Build Check"
permissions:
  contents: write
  pull-requests: write
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
jobs:
  build-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f
      - name: Build
        shell: bash
        run: |
          result=$(nix build --accept-flake-config --show-trace --print-out-paths --no-link -L .#)
          res=$?

          echo "result=$result" >> $GITHUB_OUTPUT
          if [ $res -eq 0 ]; then
            echo "build_result=success" >> $GITHUB_OUTPUT
          else
            echo "build_result=failure" >> $GITHUB_OUTPUT
            exit $res
          fi
      - name: Diff profile
        id: diff
        run: |
          {
            new_path="${{ steps.build.outputs.result }}"
            echo "new_path=$new_path" >> $GITHUB_OUTPUT
            old_path=$(nix eval --accept-flake-config --raw ".#")
            res=$?
            if [ $res -ne 0 ]; then
              echo "Failed to get old path for $RUNNER_OS" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo 'body<<EOF'
            echo "# $RUNNER_OS changes"

            nix store diff-closures --accept-flake-config --derivation \
                "github:${{ github.repository }}/${{ github.event.before }}" \
                "." | sed 's/\x1b\[[0-9;]*m//g'
                "$old_path" \
                "$new_path" | sed 's/\x1b\[[0-9;]*m//g'
            res=$?

            echo 'EOF'
          } >> $GITHUB_OUTPUT
          if [ $res -eq 0 ]; then
            echo "diff_result=success" >> $GITHUB_OUTPUT
          else
            echo "diff_result=failure" >> $GITHUB_OUTPUT
            exit $res
          fi
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const body = `${{ steps.diff.outputs.body }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const body = `${{ steps.diff.outputs.body }}`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body
            });
  builds-passed:
    name: All builds succeeded
    needs: build-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "Some tests failed"
            exit 1
          fi
          echo "All tests passed"
